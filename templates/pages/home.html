{% extends "base.html" %}
{% block page %}home{% endblock %}
{% block content %}
<div style="max-width:1200px;margin:0 auto;padding:20px 16px">
  <div style="background:linear-gradient(135deg,var(--primary) 0%,#8b5cf6 100%);border-radius:16px;padding:28px 24px;margin-bottom:20px;text-align:center">
    <h1 style="margin:0 0 16px;font-size:26px;font-weight:800;color:#fff" data-i18n="home.title">Marketplace</h1>
    <div style="display:flex;max-width:520px;margin:0 auto;gap:0">
      <input id="home-search" data-i18n-placeholder="home.search" placeholder="Search" style="flex:1;padding:12px 16px;border-radius:10px 0 0 10px;border:none;font-size:15px;outline:none;background:#fff;color:#111">
      <button type="button" id="home-search-btn" style="background:#fff;color:var(--primary);border:none;border-radius:0 10px 10px 0;padding:12px 20px;font-weight:700;cursor:pointer;font-size:18px">🔍</button>
    </div>
  </div>
  <div id="category-pills" class="cat-pills-wrap"></div>
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
    <div>
      <label style="display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase" data-i18n="home.minPrice">Min</label>
      <input id="home-min-price" type="number" placeholder="0" style="padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;width:130px;color:var(--text);background:var(--bg)">
    </div>
    <div>
      <label style="display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase" data-i18n="home.maxPrice">Max</label>
      <input id="home-max-price" type="number" placeholder="∞" style="padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;width:130px;color:var(--text);background:var(--bg)">
    </div>
    <div>
      <label style="display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase" data-i18n="home.location">Location</label>
      <input id="home-location" data-i18n-placeholder="home.location" placeholder="Location" style="padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;width:130px;color:var(--text);background:var(--bg)">
    </div>
    <div>
      <label style="display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase" data-i18n="home.sort">Sort</label>
      <select id="home-sort" style="padding:7px 10px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;width:130px;color:var(--text);background:var(--bg2)">
        <option value="newest" data-i18n="home.sortNewest">Newest</option>
        <option value="popular" data-i18n="home.sortPopular">Popular</option>
        <option value="price_asc" data-i18n="home.sortPriceAsc">Price ↑</option>
        <option value="price_desc" data-i18n="home.sortPriceDesc">Price ↓</option>
      </select>
    </div>
    <button type="button" id="home-clear-filters" style="display:none;background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;align-self:flex-end">✕ Clear</button>
  </div>
  <p id="home-result-count" style="color:var(--text2);font-size:13px;margin-bottom:16px"></p>
  <div id="home-loading" style="text-align:center;padding:60px;color:var(--text3);display:none"><span data-i18n="common.loading">Loading</span></div>
  <div id="home-empty" style="text-align:center;padding:60px;color:var(--text3);display:none">
    <p style="font-size:48px;margin:0 0 12px">📭</p>
    <p data-i18n="home.noProducts">No products</p>
  </div>
  <div id="product-grid"></div>
  <div style="text-align:center;margin-top:32px">
    <button type="button" id="home-load-more" style="display:none;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:12px 36px;font-size:15px;font-weight:600;cursor:pointer" data-i18n="home.loadMore">Load more</button>
  </div>
</div>
{% endblock %}
