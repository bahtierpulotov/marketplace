{% extends "base.html" %}
{% block page %}direct_chat{% endblock %}
{% block body_extra %}data-product-id="{{ product_id|escape }}"{% endblock %}
{% block content %}
<div class="dc-wrap">
  <div class="dc-panel">
    <header class="dc-header">
      <a id="dc-back" href="/" class="dc-back" aria-label="Назад">
        <svg class="dc-back__icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
      </a>
      <div class="dc-peer">
        <div id="dc-avatar" class="dc-peer__avatar" aria-hidden="true"></div>
        <div class="dc-peer__text">
          <p id="dc-title" class="dc-peer__name">…</p>
          <p id="dc-sub" class="dc-peer__product"></p>
        </div>
      </div>
    </header>
    <div id="dc-msgs" class="dc-msgs"></div>
    <footer class="dc-compose">
      <input id="dc-input" class="dc-input" type="text" placeholder="Паём..." autocomplete="off" />
      <button type="button" id="dc-send" class="dc-send" aria-label="Фиристодан">
        <svg class="dc-send__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      </button>
    </footer>
  </div>
</div>
{% endblock %}
